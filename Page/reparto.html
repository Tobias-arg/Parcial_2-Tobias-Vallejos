    <h1>Reparto Principal</h1>
</p>

<body  id="arriba" class="reparto"> 
<section class="tarjetas">

    <article class="actores">
    <figure>
            <img src="../Reparto/Michael Beck.jpg"alt="Swan"/>

            <figcaption><h2>"Swan" Interpretado por: Michael Beck </h2>
                <p></p>
                Poco después protagonizó Xanadu (un musical que fracasó en taquilla y frenó su carrera en el cine). Pasó a trabajar en series de televisión y hoy en día es un reconocido y exitoso narrador de audiolibros.
            </figcaption>
        </figure>
    </article>
    
    <article class="actores">
        <figure>
            <img src="../Reparto/Ajax - The Warriors.jpg" >
            <figcaption> <h2>"Ajax" Interpretado por James Remar </h2>
                <p></p>
                Fue el que más triunfó en Hollywood. Lo viste seguro como el fantasma del padre en la serie Dexter, en Sex and the City o en películas como Django Unchained. Sigue súper activo.
                </figcaption>
            
        </figure>
    
    </article>

    <article class="actores">
        <figure>
            <img src="../Reparto/Cine.jpg" >
            <figcaption><h2>"Cleon" Interpretado por: Dorsey Wright </h2>
                <p></p>
                Tuvo un papel en la película musical Hair (1979), pero al poco tiempo se cansó de los castings. Se retiró de la actuación y trabajó durante décadas para la empresa de subtes de Nueva York (la MTA).
            </figcaption>
        </figure>
    </article>

    <article class="actores">
       <figure>
            <img src="../Reparto/descarga (4).jpg">
           <figcaption> <h2>"Rembrant" Interpretado por: Marcelino Sanchez </h2>
            <p></p>
            El grafitero del grupo siguió actuando en algunas series de televisión. Lamentablemente, falleció muy joven en 1986, a los 28 años, a causa de un cáncer terminal.
           </figcaption> 
            
        </figure>
    </article>

    <article class="actores">
        <figure>
            <img src="../Reparto/Snow.jpg" >
            <figcaption> <h2> "Cochise" Interpretado por: David Harris </h2>
                <p></p>
                Tuvo una carrera muy respetable apareciendo como invitado en series policiales legendarias como Miami Vice, NYPD Blue y Law & Order. Falleció recientemente, a finales de 2024.
             </figcaption>
        </figure>  
    </article>

    <article class="actores">
        <figure>
            <img src="../Reparto/The Warriors _snow_.jpg">
            <figcaption><h2> "Snow" Interpretado por: Brian Tyler </h2>
                <p></p>
                Prácticamente desapareció del mapa cinematográfico después de esta película. Decidió alejarse por completo de la actuación en Hollywood para dedicarse a la música y a su vida privada.
            </figcaption>
        </figure>
    </article>

    <article class="actores">
        <figure>
            <img src="../Reparto/descarga (2).jpg" >
            <figcaption><h2>"Cowboy" Interpretado por: Tom McKitterick </h2>
                <p></p>
                The Warriors fue su debut y despedida del cine comercial. Hizo un poco de teatro en Nueva York, dejó la actuación definitivamente y se convirtió en periodista y escritor profesional.
            </figcaption>
        </figure>
    </article>

    <article class="actores">
        <figure>
        <img src="../Reparto/descarga (3).jpg" >
       <figcaption><h2> "Vermin" Interpretado por: Terry Michos</h2>
        <p></p>
        Hizo algunos papeles menores en televisión durante los años 80 y luego cambió de rumbo por completo. Se dedicó a ser conductor de noticias en televisión local, locutor de radio y profesor de oratoria.
       </figcaption>
       </figure>
    </article>

    <article class="actores">
        <figure>
            <img src="../Reparto/Mercy- The Lost Boys.jpg" >
           <figcaption> <h2> "Mercy" Interpretada por: Deborah Van Valkenburgh</h2>
            <p></p>
            Le fue muy bien. Se convirtió en una cara muy famosa en Estados Unidos gracias a la serie de comedia Too Close for Comfort en los 80, y siguió trabajando en cine y TV hasta el día de hoy.
           </figcaption>
        </figure>
   
    </article>

    <article class="actores">
        <figure>
            <img src="../Reparto/1979 The Warriors.jpg" >
          <figcaption> <h2> "Luther" Interpretado por: David Patrick Kelly</h2>
            <p></p>
            ¡El gran villano de la película! El inolvidable loco que chocaba las botellas se convirtió en un actor de culto espectacular. Trabajó en Twin Peaks, El Cuervo, John Wick y la clásica Commando junto a Arnold Schwarzenegger.
          </figcaption>
        </figure>   
    </article>
